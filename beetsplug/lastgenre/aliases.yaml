# Ampersands / Delimiters
drum and bass:
    - d(rum)?[ &n/]*b(ass)?
rhythm and blues:
    - r(hythm)?[ &n/]*b(lues)?
rock and roll:
    - rock[ '‐&n/ \-]*roll

# Hyphenation: k-pop, j-rock, post-rock, lo-fi, p-funk, avant-garde
\1-\2:
    - ([ckj]) *(folk|goth|pop|rock|ska|trance)
post-\1:
    - post +(\w+)
lo-fi:
    - (g?lo) *fi
\1-funk:
    - ([pg]) *funk
avant-garde:
    - avant *(garde?)?
    - avant-gard

# synth... spellings
synthwave:
    - synth[- ]*wave
synth funk:
    - synth[- ]*funk
synth-pop:
    - synth[- ]*pop

# Nu- spellings: nu-disco -> nu disco, nu-jazz -> nu jazz
nu \1:
    - nu[ -]*(disco|jazz|metal|soul)

# Old School spellings: old-skool-jungle/-hardcore, oldschool hip-hop
old school hip hop:
    - old[ -]*(?:school|skool)[ -]+hip[ -]*hop
old school \1:
    - old[ -]*(?:school|skool)[ -]+(\w+)

# Terminology / Synonyms
electronic:
    - electronic music
world music:
    - world
chillout:
    - chill[ -]*out
darkwave:
    - dark[ -]*wave
downtempo:
    - down[ -]*beat
shoegaze:
    - shoegaz(e?r?|ing)
footwork:
    - (chicago )?footwork( music)?
juke:
    - (chicago )?juke( music| house)?

# Spacing: hip hop, trip hop, etc.
\1 hop:
    - (glitch|hip|jazz|trip)y?([ -]*hip)?[ -]*hop

# Compound genres
\1 rock:
    - (blues|folk|indie|gothic|progressive)[ -]*rock
alternative rock:
    - alt[ -]*rock
    - alternative[ -]*rock
indie rock:
    - indie[ -]*rock
# negative lookahead avoids matching 'gothic metal'
gothic rock:
    - goth(?!ic)([ -]*rock)?
    - gothic[ -]*rock
# avoids matching 'progressive metal'
progressive rock:
    - prog([ -]*rock)?
    - progressive[ -]*rock
punk rock:
    - punk
traditional folk:
    - traditional[ -]*folk
# psy folk, psych-pop, psychedelic-rock, psychedelic soul, but not psychedelic (standalone)
psychedelic \1:
    - psy(?:ch(?:edelic)?)?[ -]*(folk|pop|rock|soul)
psytrance:
    - psy[ -]*trance
ska jazz:
    - ska[ -]*jazz
dixieland:
    - dixieland[ -]*jazz
