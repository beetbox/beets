# Global Options
# path to the beets library database
library: /media/jack/samsung1tb/cursor/beets/config/library.blb

# path to where files imported will be coppied
directory: /media/jack/samsung1tb/cursor/beets/output

plugins: info edit fuzzy scrub zero fetchart originquery musicbrainz discogs

art_filename: cover

threaded: yes

original_date: no

aunique:
    keys: albumartist album
    disambiguators: albumdisambig releasegroupdisambig albumtype
    bracket: '[]'

sunique:
    keys: artist title
    disambiguators: year trackdisambig
    bracket: '[]'

# Importer Options
import:
    write: yes
    copy: yes
    move: no
    resume: ask
    incremental: yes
    incremental_skip_later: yes
    timid: yes
    languages: en

# Autotagger Matching Options
match:
    strong_rec_thresh: 0.04
    max_rec:
        catalognum: medium
    distance_weights:
        data_source: 0.0 # Disable data source matching
        album: 2.0
        tracks: 1.0
        catalognum: 5.0
    ignored: media catalognum

# Path Format Configuration
paths:
    default: $albumartist/$album ($year) [$label $catalognum] [$media $format]%aunique{}/$track $title
    singleton: Non-Album/$artist/$title
    comp: Compilations/$album%aunique{} ($year) [$media $format]/$track $title

# Plugins
scrub:
    auto: yes

zero:
    auto: yes
    fields: images

fetchart:
    auto: true
    # cover_names: cover front art album folder
    sources:
      - filesystem
      - coverart
      - itunes
      - amazon
      - albumart
    store_source: yes

originquery:
    origin_file: origin.yaml
    tag_patterns:
        media: '$.Media'
        year: '$."Edition year"'
        label: '$."Record label"'
        catalognum: '$."Catalog number"'
        albumdisambig: '$.Edition'

musicbrainz:
    extra_tags: [barcode, catalognum, country, label, media, year]
    external_ids:
        discogs: yes
        spotify: yes
        bandcamp: yes
        beatport: yes
        deezer: yes
        tidal: yes

discogs:
    user_token: "suyvMBxdpjdBoFrAkAVrzqnywFKGwvXfhcUWJtid"
    extra_tags: [catalognum, country, label, year]
